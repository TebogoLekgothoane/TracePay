name: Pull Request Checks

on:
  pull_request:

jobs:
  backend:
    name: Backend format, types, and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web/backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff format --check app/observability.py app/errors.py tests
      - run: pyright app/observability.py app/errors.py tests
      - run: pytest tests -q

  dashboard:
    name: Dashboard type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit --pretty false
